<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuidar Seguro — Segurança do Paciente para Quem Cuida</title>
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,600;0,9..144,700;1,9..144,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    :root{--verde:#1a5c8a;--verde-claro:#2a8fcc;--verde-suave:#dbeef7;--creme:#f0f7fc;--texto:#1c2b3a;--texto-leve:#3a5a72;--borda:#b8d8ed;--branco:#ffffff;--destaque:#f0a500;}
    *{margin:0;padding:0;box-sizing:border-box;}
    body{font-family:'DM Sans',sans-serif;background:var(--creme);color:var(--texto);overflow-x:hidden;}
    nav{position:fixed;top:0;left:0;right:0;z-index:100;display:flex;align-items:center;justify-content:space-between;padding:1rem 3rem;background:rgba(250,248,243,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--borda);}
    .nav-logo{font-family:'Fraunces',serif;font-size:1.4rem;font-weight:700;color:var(--verde);letter-spacing:-0.02em;}
    .nav-logo span{color:var(--verde-claro);}
    .nav-links{display:flex;gap:2rem;list-style:none;}
    .nav-links a{text-decoration:none;color:var(--texto-leve);font-size:0.9rem;font-weight:500;transition:color 0.2s;}
    .nav-links a:hover{color:var(--verde);}
    .nav-cta{background:var(--verde);color:white;padding:0.5rem 1.2rem;border-radius:2rem;text-decoration:none;font-size:0.88rem;font-weight:500;transition:background 0.2s,transform 0.2s;}
    .nav-cta:hover{background:var(--verde-claro);transform:translateY(-1px);}
    .hero{min-height:100vh;display:grid;grid-template-columns:1fr 1fr;align-items:center;padding:7rem 3rem 3rem;gap:4rem;position:relative;overflow:hidden;}
    .hero::before{content:'';position:absolute;top:-100px;right:-100px;width:600px;height:600px;background:radial-gradient(circle,rgba(42,171,133,0.12) 0%,transparent 70%);border-radius:50%;animation:pulso 6s ease-in-out infinite;}
    @keyframes pulso{0%,100%{transform:scale(1);opacity:0.7;}50%{transform:scale(1.08);opacity:1;}}
    .hero-tag{display:inline-block;background:var(--verde-suave);color:var(--verde);font-size:0.78rem;font-weight:500;padding:0.35rem 0.9rem;border-radius:2rem;border:1px solid var(--borda);margin-bottom:1.5rem;animation:fadeUp 0.6s ease both;}
    .hero h1{font-family:'Fraunces',serif;font-size:clamp(2.8rem,4vw,4rem);font-weight:700;line-height:1.1;letter-spacing:-0.03em;color:var(--texto);margin-bottom:1.5rem;animation:fadeUp 0.7s 0.1s ease both;}
    .hero h1 em{font-style:italic;font-weight:300;color:var(--verde);}
    .hero p{font-size:1.1rem;line-height:1.7;color:var(--texto-leve);max-width:480px;margin-bottom:2.5rem;animation:fadeUp 0.7s 0.2s ease both;}
    .hero-btns{display:flex;gap:1rem;flex-wrap:wrap;animation:fadeUp 0.7s 0.3s ease both;}
    .btn-primary{background:var(--verde);color:white;padding:0.85rem 2rem;border-radius:2rem;text-decoration:none;font-weight:500;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.5rem;}
    .btn-primary:hover{background:var(--verde-claro);transform:translateY(-2px);box-shadow:0 8px 20px rgba(26,122,94,0.25);}
    .btn-secondary{border:1.5px solid var(--borda);color:var(--texto-leve);padding:0.85rem 2rem;border-radius:2rem;text-decoration:none;font-weight:500;transition:all 0.2s;display:inline-flex;align-items:center;gap:0.5rem;}
    .btn-secondary:hover{border-color:var(--verde);color:var(--verde);}
    .hero-visual{display:flex;align-items:center;justify-content:center;position:relative;animation:fadeUp 0.8s 0.2s ease both;}
    .stats-bar{background:var(--verde);padding:2rem 3rem;display:flex;justify-content:center
